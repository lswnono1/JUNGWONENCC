name: Diagnose Enhancement Launcher

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  diagnose:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: python -m pip install PySide6
      - name: Run launcher self-test and capture traceback
        shell: pwsh
        continue-on-error: true
        run: |
          $env:QT_QPA_PLATFORM = "offscreen"
          $env:JLM_DATA_ROOT = "$PWD\launcher-diagnostic-data"
          $output = python launch_v10_9_link_mode.py --self-test 2>&1
          $code = $LASTEXITCODE
          "ExitCode: $code" | Set-Content launcher-diagnostic.txt -Encoding UTF8
          $output | Add-Content launcher-diagnostic.txt -Encoding UTF8
          Get-Content launcher-diagnostic.txt
      - name: Post diagnostic to pull request
        if: github.event_name == 'pull_request'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $text = Get-Content launcher-diagnostic.txt -Raw
          $body = "### Enhancement launcher diagnostic`n```text`n$text`n```"
          $body | Set-Content launcher-comment.md -Encoding UTF8
          gh pr comment ${{ github.event.pull_request.number }} --body-file launcher-comment.md
      - uses: actions/upload-artifact@v4
        with:
          name: enhancement-launcher-diagnostic
          path: launcher-diagnostic.txt
          retention-days: 7
