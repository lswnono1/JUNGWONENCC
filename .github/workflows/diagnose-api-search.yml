name: Diagnose API Search Patch

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run API search tests
        run: python -m v10_9_link_mode.api_search_selftest
