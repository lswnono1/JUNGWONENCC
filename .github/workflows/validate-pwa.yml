name: Validate PWA
on:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Validate files and JavaScript
        run: |
          test -f lawmonitor/index.html
          test -f lawmonitor/manifest.webmanifest
          test -f lawmonitor/sw.js
          node --check lawmonitor/app.js
          node --check lawmonitor/sw.js
          node -e "JSON.parse(require('fs').readFileSync('lawmonitor/manifest.webmanifest','utf8'))"
      - name: Test static serving
        run: |
          python3 -m http.server 8080 >/tmp/http.log 2>&1 &
          pid=$!
          sleep 2
          curl --fail --silent --show-error http://127.0.0.1:8080/lawmonitor/ >/dev/null
          curl --fail --silent --show-error http://127.0.0.1:8080/lawmonitor/manifest.webmanifest >/dev/null
          kill $pid
      - name: Inspect official API CORS headers
        continue-on-error: true
        run: |
          set -x
          curl -sS -D /tmp/law.headers -o /tmp/law.body 'https://www.law.go.kr/DRF/lawSearch.do?OC=test&target=law&type=JSON&query=%EC%86%8C%EB%B0%A9&display=1&page=1'
          cat /tmp/law.headers
          grep -i '^access-control-allow-origin:' /tmp/law.headers || echo 'LAW_API_CORS_HEADER_NOT_FOUND'
          curl -sS -D /tmp/notice.headers -o /tmp/notice.body 'https://www.lawmaking.go.kr/rest/ogLmPp.xml?OC=test&diff=0&lsNm=%EC%86%8C%EB%B0%A9&pageIndex=1&pageUnit=1'
          cat /tmp/notice.headers
          grep -i '^access-control-allow-origin:' /tmp/notice.headers || echo 'NOTICE_API_CORS_HEADER_NOT_FOUND'
