name: Build v10.9 Link Mode

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install PySide6 pyinstaller

      - name: Compile source
        run: |
          python -m py_compile launch_v10_9_link_mode.py v10_9_link_mode/core.py v10_9_link_mode/ui.py v10_9_link_mode/main.py v10_9_link_mode/selftest.py v10_9_link_mode/api_search_patch.py v10_9_link_mode/api_search_selftest.py v10_9_link_mode/enhancement_patch.py v10_9_link_mode/enhancement_selftest.py v10_9_link_mode/actual_change_cleanup_patch.py v10_9_link_mode/actual_change_cleanup_selftest.py

      - name: Initialize incomplete database
        run: |
          python -m v10_9_link_mode.selftest repair-init

      - name: Verify repaired database columns
        run: |
          python -m v10_9_link_mode.selftest repair-columns

      - name: Verify repaired database values
        run: |
          python -m v10_9_link_mode.selftest repair-values

      - name: Test metadata-only records
        run: |
          python -m v10_9_link_mode.selftest records

      - name: Test official API search routing and fallback
        run: |
          python -m v10_9_link_mode.api_search_selftest

      - name: Test daily dashboard notice and catalog enhancements
        shell: pwsh
        run: |
          $env:QT_QPA_PLATFORM = "offscreen"
          python -m v10_9_link_mode.enhancement_selftest

      - name: Test false-positive amendment cleanup
        shell: pwsh
        run: |
          $env:QT_QPA_PLATFORM = "offscreen"
          python -m v10_9_link_mode.actual_change_cleanup_selftest

      - name: Test user interface construction
        shell: pwsh
        run: |
          $env:QT_QPA_PLATFORM = "offscreen"
          python -m v10_9_link_mode.selftest ui

      - name: Test combined launcher self-test
        shell: pwsh
        run: |
          $env:QT_QPA_PLATFORM = "offscreen"
          $env:JLM_DATA_ROOT = "$PWD\source-self-test"
          python launch_v10_9_link_mode.py --self-test

      - name: Build portable Windows program
        shell: pwsh
        run: |
          pyinstaller `
            --noconfirm `
            --clean `
            --windowed `
            --onedir `
            --contents-directory runtime `
            --name JungwonLawMonitor_v10_9_Link_Mode `
            launch_v10_9_link_mode.py

      - name: Test built executable
        shell: pwsh
        run: |
          $env:QT_QPA_PLATFORM = "offscreen"
          $env:JLM_DATA_ROOT = "$PWD\exe-self-test"
          & "$PWD\dist\JungwonLawMonitor_v10_9_Link_Mode\JungwonLawMonitor_v10_9_Link_Mode.exe" --self-test
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force package | Out-Null
          Copy-Item -Recurse dist\JungwonLawMonitor_v10_9_Link_Mode package\JungwonLawMonitor_v10_9_Link_Mode

          @"
          @echo off
          chcp 65001 >nul
          start "" "%~dp0JungwonLawMonitor_v10_9_Link_Mode\JungwonLawMonitor_v10_9_Link_Mode.exe"
          "@ | Set-Content package\START.cmd -Encoding ascii

          @"
          @echo off
          chcp 65001 >nul
          echo === Jungwon Law Monitor v10.9 Daily Fix Diagnose === > diagnostic.txt
          echo Date: %date% %time% >> diagnostic.txt
          echo Folder: %cd% >> diagnostic.txt
          set QT_QPA_PLATFORM=offscreen
          set JLM_DATA_ROOT=%cd%\diagnostic-data
          "%~dp0JungwonLawMonitor_v10_9_Link_Mode\JungwonLawMonitor_v10_9_Link_Mode.exe" --self-test
          echo ExitCode: %errorlevel% >> diagnostic.txt
          echo. >> diagnostic.txt
          echo 진단이 끝났습니다. diagnostic.txt 파일을 확인하세요.
          pause
          "@ | Set-Content package\DIAGNOSE.cmd -Encoding ascii

          @"
          정원이앤씨 법령·입법예고 모니터 v10.9 Link Mode Daily Fix

          [이번 수정]
          - 과거 기준선이 신규 개정으로 잘못 표시되는 문제 자동 정리
          - 기존 잘못 분류된 행은 삭제하지 않고 신규·실제 개정 표시만 해제
          - 관리대상, 법령 ID, 마지막 기준선은 그대로 유지
          - 정리 이후 API에서 기준선이 실제로 달라진 경우만 신규 개정으로 표시

          [주요 기능]
          - 프로그램 실행 자동점검은 하루 한 번만 수행
          - 대시보드 수치 클릭 시 관리대상·점검 사용·신규 개정·신규 입법예고 목록 팝업
          - 최근 개정사항은 실행일 기준 전후 30일, 설정에서 1~365일 변경 가능
          - 관리대상 추가 시 국가법령정보센터 현행법령·행정규칙 유사검색 후 선택
          - 최초 기준선은 개정사항 메뉴에서 제외하고 실제 변경만 표시
          - 국민참여입법센터 공식 ogLmPp XML 필드 기준 입법예고 연동
          - 법규 조문·별표·첨부파일·입법예고 본문은 저장하지 않음
          - 상세 내용은 공식 사이트 링크로 확인

          [실행]
          1. ZIP을 새 폴더에 완전히 압축 해제합니다.
          2. START.cmd를 실행합니다.
          3. 기존 DB가 있으면 첫 실행 시 잘못 분류된 신규 개정 표시를 자동 정리합니다.
          4. 설정에서 국가법령정보 API OC와 입법예고 API OC를 확인합니다.

          [사용자 데이터]
          %LOCALAPPDATA%\JungwonLawMonitor\database\law_monitor_v10_9_link_mode.db

          기존 관리대상과 기준선은 삭제하거나 변경하지 않습니다.
          "@ | Set-Content package\사용방법.txt -Encoding UTF8

          @"
          Build: $env:GITHUB_RUN_ID
          Commit: $env:GITHUB_SHA
          Python: 3.12
          Packaging: PyInstaller onedir
          Fix: legacy false-positive amendment flags reset once
          "@ | Set-Content package\BUILD_INFO.txt -Encoding UTF8

          Compress-Archive -Path package\* -DestinationPath JungwonLawMonitor_Windows_Portable_v10_9_Link_Mode_Daily_Fix.zip -Force
          $hash = (Get-FileHash JungwonLawMonitor_Windows_Portable_v10_9_Link_Mode_Daily_Fix.zip -Algorithm SHA256).Hash.ToLower()
          $hash | Set-Content JungwonLawMonitor_Windows_Portable_v10_9_Link_Mode_Daily_Fix.zip.sha256 -Encoding ascii
          Write-Host "SHA256=$hash"

      - uses: actions/upload-artifact@v4
        with:
          name: JungwonLawMonitor-v10.9-LinkMode-Daily-Fix
          path: |
            JungwonLawMonitor_Windows_Portable_v10_9_Link_Mode_Daily_Fix.zip
            JungwonLawMonitor_Windows_Portable_v10_9_Link_Mode_Daily_Fix.zip.sha256
          retention-days: 90
