name: Build v10.9 Link Mode

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install PySide6 pyinstaller

      - name: Compile source
        run: |
          python -m py_compile launch_v10_9_link_mode.py v10_9_link_mode/core.py v10_9_link_mode/ui.py v10_9_link_mode/main.py v10_9_link_mode/selftest.py v10_9_link_mode/api_search_patch.py v10_9_link_mode/api_search_selftest.py v10_9_link_mode/enhancement_patch.py v10_9_link_mode/enhancement_selftest.py v10_9_link_mode/actual_change_cleanup_patch.py v10_9_link_mode/actual_change_cleanup_selftest.py v10_9_link_mode/period_notice_patch.py v10_9_link_mode/period_notice_selftest.py v10_9_link_mode/final_behavior_patch.py v10_9_link_mode/final_behavior_selftest.py

      - name: Initialize incomplete database
        run: python -m v10_9_link_mode.selftest repair-init

      - name: Verify repaired database columns
        run: python -m v10_9_link_mode.selftest repair-columns

      - name: Verify repaired database values
        run: python -m v10_9_link_mode.selftest repair-values

      - name: Test metadata-only records
        run: python -m v10_9_link_mode.selftest records

      - name: Test official API search routing and fallback
        run: python -m v10_9_link_mode.api_search_selftest

      - name: Test daily dashboard notice and catalog enhancements
        shell: pwsh
        run: |
          $env:QT_QPA_PLATFORM = "offscreen"
          python -m v10_9_link_mode.enhancement_selftest

      - name: Test false-positive amendment cleanup
        shell: pwsh
        run: |
          $env:QT_QPA_PLATFORM = "offscreen"
          python -m v10_9_link_mode.actual_change_cleanup_selftest

      - name: Test period filters direct notices and keyboard controls
        shell: pwsh
        run: |
          $env:QT_QPA_PLATFORM = "offscreen"
          python -m v10_9_link_mode.period_notice_selftest

      - name: Test final Enter future enforcement and notice pagination fixes
        shell: pwsh
        run: |
          $env:QT_QPA_PLATFORM = "offscreen"
          python -m v10_9_link_mode.final_behavior_selftest

      - name: Test user interface construction
        shell: pwsh
        run: |
          $env:QT_QPA_PLATFORM = "offscreen"
          python -m v10_9_link_mode.selftest ui

      - name: Test combined launcher self-test
        shell: pwsh
        run: |
          $env:QT_QPA_PLATFORM = "offscreen"
          $env:JLM_DATA_ROOT = "$PWD\source-self-test"
          python launch_v10_9_link_mode.py --self-test

      - name: Build portable Windows program
        shell: pwsh
        run: |
          pyinstaller `
            --noconfirm `
            --clean `
            --windowed `
            --onedir `
            --contents-directory runtime `
            --name JungwonLawMonitor_v10_9_Link_Mode `
            launch_v10_9_link_mode.py

      - name: Test built executable
        shell: pwsh
        run: |
          $env:QT_QPA_PLATFORM = "offscreen"
          $env:JLM_DATA_ROOT = "$PWD\exe-self-test"
          & "$PWD\dist\JungwonLawMonitor_v10_9_Link_Mode\JungwonLawMonitor_v10_9_Link_Mode.exe" --self-test
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force package | Out-Null
          Copy-Item -Recurse dist\JungwonLawMonitor_v10_9_Link_Mode package\JungwonLawMonitor_v10_9_Link_Mode

          @"
          @echo off
          chcp 65001 >nul
          start "" "%~dp0JungwonLawMonitor_v10_9_Link_Mode\JungwonLawMonitor_v10_9_Link_Mode.exe"
          "@ | Set-Content package\START.cmd -Encoding ascii

          @"
          @echo off
          chcp 65001 >nul
          echo === Jungwon Law Monitor v10.9 Final Fix Diagnose === > diagnostic.txt
          echo Date: %date% %time% >> diagnostic.txt
          echo Folder: %cd% >> diagnostic.txt
          set QT_QPA_PLATFORM=offscreen
          set JLM_DATA_ROOT=%cd%\diagnostic-data
          "%~dp0JungwonLawMonitor_v10_9_Link_Mode\JungwonLawMonitor_v10_9_Link_Mode.exe" --self-test
          echo ExitCode: %errorlevel% >> diagnostic.txt
          echo. >> diagnostic.txt
          echo 진단이 끝났습니다. diagnostic.txt 파일을 확인하세요.
          pause
          "@ | Set-Content package\DIAGNOSE.cmd -Encoding ascii

          @"
          정원이앤씨 법령·입법예고 모니터 v10.9 Final Fix

          [이번 수정]
          - 관리대상 추가 검색창에서 Enter 입력 시 관리대상 즉시 추가를 차단하고 법제처 검색만 실행
          - 검색창에서 ESC 입력 시 추가창 취소
          - 최초 기준선이라도 시행일이 오늘 이후인 법령은 '시행예정' 개정사항으로 등록
          - 개정사항 기간 조회 시 공포·발령일 또는 시행일을 함께 판정
          - 시행일이 오늘 이후인 법령은 선택기간과 관계없이 개정사항에 포함
          - 입법예고 API를 첫 페이지만 읽지 않고 최대 50페이지까지 순차 조회
          - 건축법 시행령 일부개정령(안)처럼 괄호가 있는 제목도 직접 연관으로 판정
          - 건축법과 건축법 시행령처럼 상위법·하위법이 다른 항목은 오연결 방지
          - 종료된 입법예고 제외 및 관리대상과 직접 연관된 진행 중 항목만 표시

          [실행]
          1. ZIP을 새 폴더에 완전히 압축 해제합니다.
          2. START.cmd를 실행합니다.
          3. 설정의 국가법령정보 API OC와 입법예고 API OC를 확인합니다.
          4. 입법예고 재조회는 상단 '지금 개정 확인'을 누릅니다.

          [사용자 데이터]
          %LOCALAPPDATA%\JungwonLawMonitor\database\law_monitor_v10_9_link_mode.db

          기존 관리대상, 기준선과 과거 기록은 삭제하지 않습니다.
          "@ | Set-Content package\사용방법.txt -Encoding UTF8

          @"
          Build: $env:GITHUB_RUN_ID
          Commit: $env:GITHUB_SHA
          Python: 3.12
          Packaging: PyInstaller onedir
          Fix: Enter search, future enforcement, complete notice pagination
          "@ | Set-Content package\BUILD_INFO.txt -Encoding UTF8

          Compress-Archive -Path package\* -DestinationPath JungwonLawMonitor_Windows_Portable_v10_9_Final_Fix.zip -Force
          $hash = (Get-FileHash JungwonLawMonitor_Windows_Portable_v10_9_Final_Fix.zip -Algorithm SHA256).Hash.ToLower()
          $hash | Set-Content JungwonLawMonitor_Windows_Portable_v10_9_Final_Fix.zip.sha256 -Encoding ascii
          Write-Host "SHA256=$hash"

      - uses: actions/upload-artifact@v4
        with:
          name: JungwonLawMonitor-v10.9-Final-Fix
          path: |
            JungwonLawMonitor_Windows_Portable_v10_9_Final_Fix.zip
            JungwonLawMonitor_Windows_Portable_v10_9_Final_Fix.zip.sha256
          retention-days: 90
