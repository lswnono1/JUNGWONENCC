name: Build v10.9 Link Mode

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install PySide6 pyinstaller

      - name: Compile source
        run: |
          python -m py_compile launch_v10_9_link_mode.py v10_9_link_mode/core.py v10_9_link_mode/ui.py v10_9_link_mode/main.py v10_9_link_mode/selftest.py v10_9_link_mode/api_search_patch.py v10_9_link_mode/api_search_selftest.py v10_9_link_mode/enhancement_patch.py v10_9_link_mode/enhancement_selftest.py v10_9_link_mode/actual_change_cleanup_patch.py v10_9_link_mode/actual_change_cleanup_selftest.py v10_9_link_mode/period_notice_patch.py v10_9_link_mode/period_notice_selftest.py

      - name: Initialize incomplete database
        run: |
          python -m v10_9_link_mode.selftest repair-init

      - name: Verify repaired database columns
        run: |
          python -m v10_9_link_mode.selftest repair-columns

      - name: Verify repaired database values
        run: |
          python -m v10_9_link_mode.selftest repair-values

      - name: Test metadata-only records
        run: |
          python -m v10_9_link_mode.selftest records

      - name: Test official API search routing and fallback
        run: |
          python -m v10_9_link_mode.api_search_selftest

      - name: Test daily dashboard notice and catalog enhancements
        shell: pwsh
        run: |
          $env:QT_QPA_PLATFORM = "offscreen"
          python -m v10_9_link_mode.enhancement_selftest

      - name: Test false-positive amendment cleanup
        shell: pwsh
        run: |
          $env:QT_QPA_PLATFORM = "offscreen"
          python -m v10_9_link_mode.actual_change_cleanup_selftest

      - name: Test period filters direct notices and keyboard controls
        shell: pwsh
        run: |
          $env:QT_QPA_PLATFORM = "offscreen"
          python -m v10_9_link_mode.period_notice_selftest

      - name: Test user interface construction
        shell: pwsh
        run: |
          $env:QT_QPA_PLATFORM = "offscreen"
          python -m v10_9_link_mode.selftest ui

      - name: Test combined launcher self-test
        shell: pwsh
        run: |
          $env:QT_QPA_PLATFORM = "offscreen"
          $env:JLM_DATA_ROOT = "$PWD\source-self-test"
          python launch_v10_9_link_mode.py --self-test

      - name: Build portable Windows program
        shell: pwsh
        run: |
          pyinstaller `
            --noconfirm `
            --clean `
            --windowed `
            --onedir `
            --contents-directory runtime `
            --name JungwonLawMonitor_v10_9_Link_Mode `
            launch_v10_9_link_mode.py

      - name: Test built executable
        shell: pwsh
        run: |
          $env:QT_QPA_PLATFORM = "offscreen"
          $env:JLM_DATA_ROOT = "$PWD\exe-self-test"
          & "$PWD\dist\JungwonLawMonitor_v10_9_Link_Mode\JungwonLawMonitor_v10_9_Link_Mode.exe" --self-test
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force package | Out-Null
          Copy-Item -Recurse dist\JungwonLawMonitor_v10_9_Link_Mode package\JungwonLawMonitor_v10_9_Link_Mode

          @"
          @echo off
          chcp 65001 >nul
          start "" "%~dp0JungwonLawMonitor_v10_9_Link_Mode\JungwonLawMonitor_v10_9_Link_Mode.exe"
          "@ | Set-Content package\START.cmd -Encoding ascii

          @"
          @echo off
          chcp 65001 >nul
          echo === Jungwon Law Monitor v10.9 Period Notice Fix Diagnose === > diagnostic.txt
          echo Date: %date% %time% >> diagnostic.txt
          echo Folder: %cd% >> diagnostic.txt
          set QT_QPA_PLATFORM=offscreen
          set JLM_DATA_ROOT=%cd%\diagnostic-data
          "%~dp0JungwonLawMonitor_v10_9_Link_Mode\JungwonLawMonitor_v10_9_Link_Mode.exe" --self-test
          echo ExitCode: %errorlevel% >> diagnostic.txt
          echo. >> diagnostic.txt
          echo 진단이 끝났습니다. diagnostic.txt 파일을 확인하세요.
          pause
          "@ | Set-Content package\DIAGNOSE.cmd -Encoding ascii

          @"
          정원이앤씨 법령·입법예고 모니터 v10.9 Period Notice Fix

          [이번 수정]
          - 관리대상 검색창에서 Enter를 누르면 법제처 검색 실행
          - 관리대상 검색창에서 ESC를 누르면 추가창 취소
          - 개정사항 메뉴에서 시작일·종료일을 지정해 기간별 실제 개정사항 조회
          - 입법예고 메뉴에서 시작일·종료일을 지정해 기간별 항목 조회
          - 종료되었거나 종료일이 지난 입법예고 제외
          - 관리대상 법규명과 직접 연관된 입법예고만 표시
          - 기존 DB의 간접·종료 입법예고는 삭제하지 않고 신규 표시와 화면 표시만 제외

          [기존 주요 기능]
          - 프로그램 실행 자동점검은 하루 한 번만 수행
          - 대시보드 수치 클릭 시 상세 항목 팝업
          - 최초 법규 확인은 기준선으로만 저장하고 실제 변경만 개정사항에 표시
          - 법규·입법예고 본문은 저장하지 않고 공식 사이트 링크로 확인

          [실행]
          1. ZIP을 새 폴더에 완전히 압축 해제합니다.
          2. START.cmd를 실행합니다.
          3. 기존 DB가 있으면 첫 실행 시 종료·간접 입법예고 표시를 자동 정리합니다.
          4. 설정에서 국가법령정보 API OC와 입법예고 API OC를 확인합니다.

          [사용자 데이터]
          %LOCALAPPDATA%\JungwonLawMonitor\database\law_monitor_v10_9_link_mode.db

          기존 관리대상, 법령 기준선과 과거 기록은 삭제하지 않습니다.
          "@ | Set-Content package\사용방법.txt -Encoding UTF8

          @"
          Build: $env:GITHUB_RUN_ID
          Commit: $env:GITHUB_SHA
          Python: 3.12
          Packaging: PyInstaller onedir
          Fix: period filters, direct active notices, Enter and ESC controls
          "@ | Set-Content package\BUILD_INFO.txt -Encoding UTF8

          Compress-Archive -Path package\* -DestinationPath JungwonLawMonitor_Windows_Portable_v10_9_Period_Notice_Fix.zip -Force
          $hash = (Get-FileHash JungwonLawMonitor_Windows_Portable_v10_9_Period_Notice_Fix.zip -Algorithm SHA256).Hash.ToLower()
          $hash | Set-Content JungwonLawMonitor_Windows_Portable_v10_9_Period_Notice_Fix.zip.sha256 -Encoding ascii
          Write-Host "SHA256=$hash"

      - uses: actions/upload-artifact@v4
        with:
          name: JungwonLawMonitor-v10.9-Period-Notice-Fix
          path: |
            JungwonLawMonitor_Windows_Portable_v10_9_Period_Notice_Fix.zip
            JungwonLawMonitor_Windows_Portable_v10_9_Period_Notice_Fix.zip.sha256
          retention-days: 90
